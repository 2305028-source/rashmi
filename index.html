<!DOCTYPE html>
<html>
<head>
    <title>Internal Script Example</title>
</head>
<body>

    <h1 id="heading">Hello World!</h1>
    <button onclick="changeText()">Click Me</button>

    <script>
        function changeText() {
            // Accesses the element by ID and changes its text
            document.getElementById("heading").innerHTML = "Text Changed by Script!";
        }
    </script>

</body>
</html>
